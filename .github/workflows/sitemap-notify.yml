name: Notify Search Engines of Sitemap Updates

on:
  push:
    branches:
      - main
    paths:
      - sitemap.xml
      - robots.txt
      - "**/*.html"
      - "blog/**"
      - "markets/**"
      - "ophthalmology/**"
      - "aesthetics/**"
      - "dentistry/**"
      - "dermocosmetics/**"
      - "healthcare-it/**"
  workflow_dispatch:

jobs:
  notify-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check live sitemap
        run: |
          curl -fsSL "https://curative.asia/sitemap.xml" | head -n 20

      - name: Notify Google of sitemap update
        run: |
          curl -fsS -o /dev/null -w "Google sitemap ping HTTP %{http_code}\n" \
            "https://www.google.com/ping?sitemap=https%3A%2F%2Fcurative.asia%2Fsitemap.xml" || true

      - name: Notify Bing of sitemap update
        run: |
          curl -fsS -o /dev/null -w "Bing sitemap ping HTTP %{http_code}\n" \
            "https://www.bing.com/ping?sitemap=https%3A%2F%2Fcurative.asia%2Fsitemap.xml" || true
