<!--
  Curative Group — Airtable Contact Form Embed

  Setup:
  1. Publish the Contact Us form in Airtable.
  2. Copy the Airtable embed URL.
  3. Replace YOUR_AIRTABLE_FORM_URL below.
  4. Paste this section into the website page where the form should appear.
-->

<section class="curative-contact" aria-labelledby="curative-contact-heading">
  <div class="curative-contact__container">
    <header class="curative-contact__header">
      <p class="curative-contact__eyebrow">Contact Curative Group</p>
      <h2 id="curative-contact-heading">Contact Us</h2>
      <p>
        Please complete the form below, and the appropriate member of our team
        will contact you.
      </p>
    </header>

    <div class="curative-contact__form-wrap">
      <iframe
        class="curative-contact__form"
        src="YOUR_AIRTABLE_FORM_URL"
        title="Contact Curative Group"
        width="100%"
        height="1100"
        frameborder="0"
        loading="lazy"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</section>

<style>
  .curative-contact {
    padding: clamp(3rem, 7vw, 6rem) 1.25rem;
    background: #f7f9fb;
  }

  .curative-contact__container {
    width: min(100%, 900px);
    margin: 0 auto;
  }

  .curative-contact__header {
    max-width: 680px;
    margin: 0 auto 2rem;
    text-align: center;
  }

  .curative-contact__eyebrow {
    margin: 0 0 0.75rem;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .curative-contact__header h2 {
    margin: 0 0 1rem;
    font-size: clamp(2rem, 5vw, 3.25rem);
    line-height: 1.1;
  }

  .curative-contact__header p:last-child {
    margin: 0;
    font-size: 1.05rem;
    line-height: 1.7;
  }

  .curative-contact__form-wrap {
    overflow: hidden;
    border: 1px solid rgba(15, 23, 42, 0.1);
    border-radius: 18px;
    background: #ffffff;
    box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
  }

  .curative-contact__form {
    display: block;
    width: 100%;
    min-height: 1100px;
    border: 0;
    background: #ffffff;
  }

  @media (max-width: 640px) {
    .curative-contact {
      padding-inline: 0.75rem;
    }

    .curative-contact__form {
      min-height: 1250px;
    }
  }
</style>
